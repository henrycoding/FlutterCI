name: iOS Build WYS-USER

on:
  workflow_dispatch:
    inputs:
      bump_build:
        description: '是否自动增加 build 号'
        required: true
        type: boolean
        default: true
      use_jiagu:
        description: '是否加固'
        required: true
        type: boolean
        default: true
      flavor:
        description: "构建环境"
        required: true
        default: "production"
        type: choice
        options:
          - production
          - beta
      branch:
        description: "构建分支"
        required: true
        default: "main"
        type: string

jobs:
  build:
    name: CI Build
    runs-on: macos-15

    steps:
      - name: Checkout workflow repo
        uses: actions/checkout@v4

      - name: List available Xcode versions
        run: |
          ls -1 /Applications | grep -E '^Xcode.*\.app$' || true

      - name: Select Xcode version
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "26.3"

# 设置SSH KEY
      - name: Setup SSH
        run: |
          mkdir -p "$HOME/.ssh"
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
          chmod 600 "$HOME/.ssh/id_rsa"
          ssh-keyscan codeup.aliyun.com >> "$HOME/.ssh/known_hosts"
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}

# Clone Repo
      - name: Clone target repo
        run: git clone --recursive "$WYS_USER_URL" -b ${{ github.event.inputs.branch }}
        env:
          WYS_USER_URL: ${{ secrets.WYS_USER_URL }}
          WYS_USER_BRANCH: ${{ secrets.WYS_USER_BRANCH }}

      - name: Build / Base repo dir
        run: |
          echo "BUILD_REPO_DIR=${GITHUB_WORKSPACE}/wanyisheng" >> "$GITHUB_ENV"

# 版本号自动+1
      - name: Bump build number & push
        if: ${{ github.event.inputs.bump_build == 'true' }}
        run: |
          cd wanyisheng
          
          # 读取 pubspec.yaml version
          VERSION_LINE=$(grep '^version:' pubspec.yaml)
          VERSION_NAME=$(echo "$VERSION_LINE" | cut -d'+' -f1 | awk '{print $2}')
          OLD_BUILD=$(echo "$VERSION_LINE" | cut -d'+' -f2)
          OLD_BUILD=${OLD_BUILD:-0}

          # 获取今天日期 (yyyyMMdd)
          TODAY=$(date +%Y%m%d)

          # 提取旧 build 号的日期部分和计数部分
          OLD_DATE=${OLD_BUILD:0:8}
          OLD_COUNT=${OLD_BUILD:8:1}
          OLD_COUNT=${OLD_COUNT:-0}

          if [ "$OLD_DATE" = "$TODAY" ]; then
            # 如果是今天，计数+1
            NEW_COUNT=$((OLD_COUNT + 1))
          else
            # 如果不是今天，重置为0
            NEW_COUNT=0
          fi

          NEW_BUILD_NUM="${TODAY}${NEW_COUNT}"

          echo "Current version: $VERSION_NAME+$OLD_BUILD"
          echo "New build number: $NEW_BUILD_NUM"
          
          # 替换 pubspec.yaml
          # 兼容 macOS 和 Linux 的 sed
          if [ "${{ runner.os }}" = "macOS" ]; then
            sed -i "" "s/^version:.*/version: $VERSION_NAME+$NEW_BUILD_NUM/" pubspec.yaml
          else
            sed -i "s/^version:.*/version: $VERSION_NAME+$NEW_BUILD_NUM/" pubspec.yaml
          fi
          echo "NEW_BUILD_NUM=$NEW_BUILD_NUM" >> $GITHUB_ENV
          
          git config user.name "${{ github.actor }}"
          git config user.email "${{ github.actor_id }}+${{ github.actor }}@users.noreply.github.com"
          git add pubspec.yaml
          git commit -m "release: $VERSION_NAME+$NEW_BUILD_NUM" || echo "No changes to commit"
          git push
          cd ..

# 安装Flutter
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version-file: wanyisheng/pubspec.yaml

      - run: flutter --version

# 动态修改 pubspec.yaml 的 icon 路径
      - name: Set launcher icon
        run: |
          cd "$BUILD_REPO_DIR"
          if [ "${{ github.event.inputs.flavor }}" = "beta" ]; then
            echo "⚙️ 切换为 Beta 图标"
            yq -i '
              .flutter_launcher_icons.image_path = "icons/icon_beta.png" |
              .flutter_launcher_icons.adaptive_icon_foreground = "icons/icon_beta.png"
            ' pubspec.yaml
          else
            echo "⚙️ 使用正式版图标"
            yq -i '
              .flutter_launcher_icons.image_path = "icons/icon.png" |
              .flutter_launcher_icons.adaptive_icon_foreground = "icons/icon.png"
            ' pubspec.yaml
          fi

      - name: Build / Launcher icons
        run: |
          cd "$BUILD_REPO_DIR"
          dart run flutter_launcher_icons
        env:
          PUB_HOSTED_URL: https://pub.flutter-io.cn
          FLUTTER_STORAGE_BASE_URL: https://storage.flutter-io.cn

      - name: Jiagu / Prepare workspace
        if: ${{ github.event.inputs.use_jiagu == 'true' }}
        run: |
          build_root="${RUNNER_TEMP}/wys-user-ios-build"
          build_repo_dir="${build_root}/wanyisheng"
          echo "Preparing jiagu workspace under: ${build_repo_dir}"
          rm -rf "$build_root"
          mkdir -p "$build_root"
          rsync -a --delete "${GITHUB_WORKSPACE}/wanyisheng/" "$build_repo_dir/"

          fastfile=$(find "$build_repo_dir" -path '*/fastlane/Fastfile' -print | sort | tail -n 1)
          if [ -z "$fastfile" ]; then
            echo "Fastfile not found in jiagu build workspace"
            exit 1
          fi

          ruby - "$fastfile" <<'RUBY'
          path = ARGV.fetch(0)
          lines = File.readlines(path)
          output = []
          skipping = false
          depth = 0

          lines.each do |line|
            if !skipping && line.match?(/^\s*upload_to_testflight\b/)
              skipping = true
              depth = line.count("(") - line.count(")")
              next
            end

            if skipping
              depth += line.count("(") - line.count(")")
              if depth <= 0
                skipping = false
                depth = 0
              end
              next
            end

            output << line
          end

          File.write(path, output.join)
          RUBY

          if grep -nE '^[[:space:]]*upload_to_testflight([^[:alnum:]_]|$)' "$fastfile" >/dev/null 2>&1; then
            echo "upload_to_testflight still present after patching temp Fastfile"
            exit 1
          fi

          echo "BUILD_REPO_DIR=${build_repo_dir}" >> "$GITHUB_ENV"
          echo "BUILD_REPO_DIR switched to jiagu workspace: ${build_repo_dir}"

      - name: Build / Install CocoaPods
        run: |
          echo "Ensuring Homebrew CocoaPods is available"
          if brew list --versions cocoapods >/dev/null 2>&1; then
            brew reinstall cocoapods
          else
            brew install cocoapods
          fi
          echo "$(brew --prefix)/bin" >> "$GITHUB_PATH"
          export PATH="$(brew --prefix)/bin:${PATH}"
          hash -r
          echo "Resolved pod binary after Homebrew setup: $(command -v pod)"
          pod --version

      - name: Build / Verify CocoaPods
        run: |
          cd "$BUILD_REPO_DIR/ios"
          echo "Ruby: $(command -v ruby)"
          ruby --version
          echo "Bundle: $(command -v bundle)"
          echo "Pod: $(command -v pod)"
          echo "PATH=${PATH}"
          if [ "$(command -v pod)" != "$(brew --prefix)/bin/pod" ]; then
            echo "Expected Homebrew pod at $(brew --prefix)/bin/pod"
            exit 1
          fi
          pod --version
          if [ -f "Flutter/Generated.xcconfig" ]; then
            echo "Flutter/Generated.xcconfig exists"
          else
            echo "Flutter/Generated.xcconfig does not exist yet; fastlane will generate it during flutter pub get"
          fi

# Build Flutter
      - name: Build / IPA
        run: |
          cd "$BUILD_REPO_DIR/ios"
          echo "Building base IPA from: $PWD"
          export PATH="$(brew --prefix)/bin:${PATH}"
          hash -r
          echo "Pod used by Build / IPA: $(command -v pod)"
          fastlane ios release_beta flavor:${{ github.event.inputs.flavor }}
        env:
          PUB_HOSTED_URL: https://pub.flutter-io.cn
          FLUTTER_STORAGE_BASE_URL: https://storage.flutter-io.cn
          MATCH_PASSWORD: ${{ secrets.BINZHOU_MATCH_PASSWORD }}
          APP_STORE_KEY_ID: ${{ secrets.BINZHOU_AUTH_KEY_ID }}
          APP_STORE_ISSUER_ID: ${{ secrets.BINZHOU_ISSUER_ID }}
          APP_STORE_PRIVATE_KEY: ${{ secrets.BINZHOU_AUTH_KEY_BASE64 }}
          APPLE_TEAM_ID: ${{ secrets.BINZHOU_APPLE_TEAM_ID }}

      - name: Build / Resolve outputs
        run: |
          archive_path=$(find "$BUILD_REPO_DIR" -name '*.xcarchive' -not -path '*/Pods/*' -not -path '*/DerivedData/*' -print | sort | tail -n 1)
          original_ipa_path=$(find "$BUILD_REPO_DIR" -name '*.ipa' -not -path '*/Pods/*' -not -path '*/DerivedData/*' -print | sort | tail -n 1)
          echo "Resolved archive_path=${archive_path}"
          echo "Resolved original_ipa_path=${original_ipa_path}"

          if [ -z "$archive_path" ]; then
            echo "No xcarchive found under ${BUILD_REPO_DIR}"
            exit 1
          fi

          if [ -z "$original_ipa_path" ]; then
            echo "No ipa found under ${BUILD_REPO_DIR}"
            exit 1
          fi

          echo "ARCHIVE_PATH=${archive_path}" >> "$GITHUB_ENV"
          echo "ORIGINAL_IPA_PATH=${original_ipa_path}" >> "$GITHUB_ENV"

      - name: Jiagu / Generate export options
        if: ${{ github.event.inputs.use_jiagu == 'true' }}
        run: |
          archive_app_path=$(find "$ARCHIVE_PATH/Products/Applications" -maxdepth 1 -name '*.app' -type d -print | sort | tail -n 1)
          echo "Archive path: ${ARCHIVE_PATH}"
          echo "Archive app bundle: ${archive_app_path}"
          if [ -z "$archive_app_path" ]; then
            echo "No .app bundle found inside archive: $ARCHIVE_PATH"
            exit 1
          fi

          export_options_plist="${RUNNER_TEMP}/wys-user-ios-export-options.plist"
          provisioning_profiles="${RUNNER_TEMP}/wys-user-ios-provisioning-profiles.txt"
          : > "$provisioning_profiles"

          original_ipa_unpack_dir="${RUNNER_TEMP}/wys-user-ios-original-ipa"
          rm -rf "$original_ipa_unpack_dir"
          mkdir -p "$original_ipa_unpack_dir"
          unzip -q "$ORIGINAL_IPA_PATH" -d "$original_ipa_unpack_dir"

          extract_profiles_from_root() {
            root_dir="$1"
            if [ ! -d "$root_dir" ]; then
              return 0
            fi

            while IFS= read -r bundle_path; do
              profile_path="${bundle_path}/embedded.mobileprovision"
              if [ ! -f "$profile_path" ]; then
                continue
              fi

              decoded_profile="${RUNNER_TEMP}/$(basename "$bundle_path").mobileprovision.plist"
              security cms -D -i "$profile_path" > "$decoded_profile"

              bundle_id=$(/usr/libexec/PlistBuddy -c 'Print :Entitlements:application-identifier' "$decoded_profile" | sed 's/^[^.]*\.//')
              profile_name=$(/usr/libexec/PlistBuddy -c 'Print :Name' "$decoded_profile")

              if [ -z "$bundle_id" ] || [ -z "$profile_name" ]; then
                echo "Failed to extract bundle id or profile name from ${profile_path}"
                exit 1
              fi

              {
                printf '    <key>%s</key>\n' "$bundle_id"
                printf '    <string>%s</string>\n' "$profile_name"
              } >> "$provisioning_profiles"
            done < <(find "$root_dir" \( -name '*.app' -o -name '*.appex' \) -type d | sort)
          }

          extract_profiles_from_root "$original_ipa_unpack_dir/Payload"
          if [ ! -s "$provisioning_profiles" ]; then
            echo "No provisioning profiles in original IPA, trying archive root"
            extract_profiles_from_root "$ARCHIVE_PATH/Products/Applications"
          fi

          export_signing_style="manual"
          export_signing_certificate="Apple Distribution"
          if [ -s "$provisioning_profiles" ]; then
            echo "Provisioning profiles extracted to: ${provisioning_profiles}"
            echo "Provisioning profile mappings:"
            cat "$provisioning_profiles"
          else
            echo "No provisioning profiles found in original IPA or archive; falling back to automatic signing export options"
            export_signing_style="automatic"
            export_signing_certificate=""
          fi

          python3 - "$export_options_plist" "$provisioning_profiles" "$APPLE_TEAM_ID" "$export_signing_style" "$export_signing_certificate" <<'PY'
          import plistlib
          import sys

          export_path, profiles_path, team_id = sys.argv[1:4]
          profiles = {}
          if len(sys.argv) > 4:
              signing_style = sys.argv[4]
          else:
              signing_style = 'manual'
          signing_certificate = sys.argv[5] if len(sys.argv) > 5 else ''

          if profiles_path and signing_style == 'manual':
              with open(profiles_path, 'r', encoding='utf-8') as fh:
                  lines = [line.strip() for line in fh if line.strip()]
              if len(lines) % 2 != 0:
                  raise SystemExit('Invalid provisioning profiles buffer')
              for i in range(0, len(lines), 2):
                  key_line = lines[i]
                  value_line = lines[i + 1]
                  if not key_line.startswith('<key>') or not key_line.endswith('</key>'):
                      raise SystemExit(f'Invalid plist key line: {key_line}')
                  if not value_line.startswith('<string>') or not value_line.endswith('</string>'):
                      raise SystemExit(f'Invalid plist string line: {value_line}')
                  bundle_id = key_line[len('<key>'):-len('</key>')]
                  profile_name = value_line[len('<string>'):-len('</string>')]
                  profiles[bundle_id] = profile_name

          data = {
              'destination': 'export',
              'method': 'app-store',
              'signingStyle': signing_style,
              'stripSwiftSymbols': True,
              'teamID': team_id,
              'uploadSymbols': True,
          }
          if signing_style == 'manual':
              data['provisioningProfiles'] = profiles
              data['signingCertificate'] = signing_certificate
          with open(export_path, 'wb') as fh:
              plistlib.dump(data, fh, sort_keys=False)
          PY

          echo "EXPORT_OPTIONS_PLIST=${export_options_plist}" >> "$GITHUB_ENV"
          echo "Generated export options plist: ${export_options_plist}"
        env:
          APPLE_TEAM_ID: ${{ secrets.BINZHOU_APPLE_TEAM_ID }}

      - name: Build / Final IPA name
        run: |
          cd "$BUILD_REPO_DIR"
          version_str=$(grep -m 1 -E '^version:' pubspec.yaml | sed 's/version: //; s/+/_/')
          if [ "${{ github.event.inputs.use_jiagu }}" = "true" ]; then
            jiagu_suffix="_jiagu"
          else
            jiagu_suffix=""
          fi
          ipa_name="wys_user_${version_str}_${{ github.event.inputs.flavor }}${jiagu_suffix}.ipa"
          echo "IPA_NAME=${ipa_name}" >> "$GITHUB_ENV"

      - name: Jiagu / Generate IPA
        if: ${{ github.event.inputs.use_jiagu == 'true' }}
        run: |
          # IJIAMI_JIAGU_CMD 需要是一个可执行的包装命令，约定如下：
          #   $IJIAMI_JIAGU_CMD <original_ipa_path> <output_jiagu_ipa_path>
          # 其中第二个参数必须写出加固后的 ipa 文件，供后续 replace_ipa_to_archive.sh 使用。
          if [ -z "${IJIAMI_JIAGU_CMD:-}" ]; then
            echo "IJIAMI_JIAGU_CMD is required when use_jiagu=true"
            exit 1
          fi

          if ! command -v "$IJIAMI_JIAGU_CMD" >/dev/null 2>&1 && [ ! -x "$IJIAMI_JIAGU_CMD" ]; then
            echo "IJIAMI_JIAGU_CMD not found or not executable: $IJIAMI_JIAGU_CMD"
            exit 1
          fi

          jiagu_output_dir="${GITHUB_WORKSPACE}/jiagu-output"
          mkdir -p "$jiagu_output_dir"
          jiagu_ipa_path="${jiagu_output_dir}/${IPA_NAME}"
          echo "Original IPA: ${ORIGINAL_IPA_PATH}"
          echo "Jiagu output dir: ${jiagu_output_dir}"
          echo "Jiagu IPA target: ${jiagu_ipa_path}"

          "$IJIAMI_JIAGU_CMD" "$ORIGINAL_IPA_PATH" "$jiagu_ipa_path"

          if [ ! -f "$jiagu_ipa_path" ]; then
            echo "Jiagu ipa not found at ${jiagu_ipa_path}"
            exit 1
          fi

          echo "JIAGU_IPA_PATH=${jiagu_ipa_path}" >> "$GITHUB_ENV"
        env:
          IJIAMI_JIAGU_CMD: ${{ secrets.IJIAMI_JIAGU_CMD }}

      - name: Jiagu / Replace into archive
        if: ${{ github.event.inputs.use_jiagu == 'true' }}
        run: |
          echo "Replacing jiagu IPA into archive: ${ARCHIVE_PATH}"
          echo "Jiagu IPA source: ${JIAGU_IPA_PATH}"
          bash ./.github/scripts/replace_ipa_to_archive.sh "$ARCHIVE_PATH" "$JIAGU_IPA_PATH"

      - name: Jiagu / Re-export IPA
        if: ${{ github.event.inputs.use_jiagu == 'true' }}
        run: |
          if [ -z "${EXPORT_OPTIONS_PLIST:-}" ]; then
            echo "EXPORT_OPTIONS_PLIST is required when use_jiagu=true"
            exit 1
          fi

          jiagu_export_dir="${GITHUB_WORKSPACE}/jiagu-export"
          rm -rf "$jiagu_export_dir"
          mkdir -p "$jiagu_export_dir"
          echo "Re-exporting jiagu archive to: ${jiagu_export_dir}"
          echo "Using export options: ${EXPORT_OPTIONS_PLIST}"

          xcodebuild -exportArchive \
            -archivePath "$ARCHIVE_PATH" \
            -exportPath "$jiagu_export_dir" \
            -exportOptionsPlist "$EXPORT_OPTIONS_PLIST"

          final_ipa_path=$(find "$jiagu_export_dir" -maxdepth 1 -name '*.ipa' -print | sort | tail -n 1)
          echo "Re-exported final IPA candidate: ${final_ipa_path}"
          if [ -z "$final_ipa_path" ]; then
            echo "Re-exported jiagu ipa not found under ${jiagu_export_dir}"
            exit 1
          fi

          echo "FINAL_IPA_PATH=${final_ipa_path}" >> "$GITHUB_ENV"

      - name: Build / Final IPA path
        if: ${{ github.event.inputs.use_jiagu != 'true' }}
        run: |
          echo "use_jiagu=false, final IPA is original IPA: ${ORIGINAL_IPA_PATH}"
          echo "FINAL_IPA_PATH=${ORIGINAL_IPA_PATH}" >> "$GITHUB_ENV"

      - name: Upload / Stage final IPA
        run: |
          final_output="${GITHUB_WORKSPACE}/${IPA_NAME}"
          echo "Staging final IPA to: ${final_output}"
          echo "Source final IPA: ${FINAL_IPA_PATH}"
          cp "$FINAL_IPA_PATH" "$final_output"
          echo "PACKAGED_IPA_PATH=${final_output}" >> "$GITHUB_ENV"

      - name: Upload / Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.IPA_NAME }}
          path: ${{ env.PACKAGED_IPA_PATH }}

      - name: Upload / TestFlight
        if: ${{ github.event.inputs.use_jiagu == 'true' }}
        run: |
          cd "$BUILD_REPO_DIR/ios"
          echo "Uploading jiagu IPA to TestFlight: ${PACKAGED_IPA_PATH}"
          fastlane pilot upload \
            -i "$PACKAGED_IPA_PATH" \
            --skip_waiting_for_build_processing true
        env:
          MATCH_PASSWORD: ${{ secrets.BINZHOU_MATCH_PASSWORD }}
          APP_STORE_KEY_ID: ${{ secrets.BINZHOU_AUTH_KEY_ID }}
          APP_STORE_ISSUER_ID: ${{ secrets.BINZHOU_ISSUER_ID }}
          APP_STORE_PRIVATE_KEY: ${{ secrets.BINZHOU_AUTH_KEY_BASE64 }}
          APPLE_TEAM_ID: ${{ secrets.BINZHOU_APPLE_TEAM_ID }}
      
# 飞书机器人通知
      - name: Notify / FeiShu
        if: always() && !cancelled()  # 排除取消状态
        run: |
          cd "$BUILD_REPO_DIR/fastlane"
          echo "Sending FeiShu notification from: $PWD"
          fastlane notify_fei_shu flavor:${{ github.event.inputs.flavor }} branch:${{ github.event.inputs.branch }}
        env:
          JOB_STATUS: ${{ job.status }}
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
